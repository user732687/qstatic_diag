pipeline:
  # Diagnostic sample selection
  m: 100           # target diagnostic set size
  seed: 42         # global RNG seed

  # filter-level vulnerability
  p_min: 0.20      # bottom percentile
  p_max: 0.95      # top percentile

  # layer-level weakness
  gamma_min: 0.05  # min normalised contribution 
  gamma_max: 0.40  # max normalised contribution 
  outlier_sigma: 2.0

  # BLOCKDIAG
  efficiency_threshold: 0.10
  residual_low: 0.05
  residual_high: 0.80

  # CORRDIAG
  rho_thresh: 0.90

  # Statistics
  bootstrap_n: 200
  alpha: 0.05

  # Multi-seed stability (1 = disabled)
  num_seeds: 1

  # Hardware
  device: cpu
  batch_size: 32

# Output settings
output:
  dir: ./qsdiag_output
  formats: [json, csv, markdown]
  plots: true

# Experiment settings
experiments:
  proxy_n_samples: 1000
  warmup_steps: 5
  m_sweep: [10, 25, 50, 100, 200]
  seed_sweep: [0, 1, 2, 3, 4]
